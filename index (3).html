const fmt = ms => {
  if(ms<=0)return null;
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  if(h>=48)return Math.floor(h/24)+"d "+h%24+"h";
  if(h>=1)return h+"h "+m+"m";
  return m+"m "+s+"s";
};

const getBadges = w => {
  const b=[], tot=w.reduce((a,x)=>a+x,0), avg=tot/w.length, mx=Math.max(...w);
  let str=0,best=0;
  for(let i=1;i<w.length;i++){if(w[i]>=w[i-1])best=Math.max(best,++str);else str=0;}
  const allMax = Math.max(...SEASON_STATS.map(p=>Math.max(...p.weeks)));
  if(mx>=allMax)b.push({icon:"🎯",label:"Perfect Week"});
  if(best>=3)b.push({icon:"🔥",label:best+"wk Streak"});
  if(avg>=9)b.push({icon:"⭐",label:"Sharp"});
  const rank=SEASON_STATS.map(p=>p.weeks.reduce((a,x)=>a+x,0)).sort((a,c)=>c-a).indexOf(tot);
  if(rank===0)b.push({icon:"👑",label:"Season Leader"});
  return b;
};

// Team Logo component
function TeamLogo({abbr, size=38}) {
  const [err, setErr] = useState(false);
  const src = logo(abbr);
  if(!src || err) return h('div',{className:'team-logo-fallback',style:{width:size,height:size,background:tc(abbr),fontSize:size*0.28}},abbr);
  return h('img',{src,alt:abbr,width:size,height:size,className:'team-logo',onError:()=>setErr(true)});
}

// Team pick button
function TeamBtn({game, side, picked, onPick, disabled}) {
  const abbr = game[side+"Abbr"], name = game[side], role = side==="away"?"Away":"Home";
  const isPicked = picked === name;
  return h('button',{
    className:'team-btn',
    style:{borderColor: isPicked?tc(abbr):"#e2e8f0", background: isPicked?tc(abbr)+"14":"#fff"},
    onClick:()=>onPick(game.id, name),
    disabled
  },
    h(TeamLogo,{abbr,size:36}),
    h('div',null,
      h('div',{className:'team-abbr'},abbr),
      h('div',{className:'team-name'},name),
      h('div',{className:'team-role'},role)
    ),
    isPicked && h('span',{className:'check'},"✓")
  );
}

      view==="playoffs"&&h(PlayoffsView),
      view==="leaderboard"&&h(LeaderView),
      view==="payouts"&&h(PayoutsView),
      view==="stats"&&h(StatsView),
      view==="register"&&h(RegisterView),
      view==="rules"&&h(RulesView),
      view==="admin"&&h(AdminView),
    ),
    h('footer',{className:'footer'},
      h('span',null,"🏈 MxPlk Gridiron Picks · 2026–2027 NFL Season"),
      h('span',{style:{opacity:.6}},"For entertainment purposes · Office use only")
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
